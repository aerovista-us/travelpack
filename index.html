<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>European Travel Companion</title>
  <meta http-equiv="refresh" content="0; url=europe-travel-companion.html" />
  <style>
    :root{--bg:#071018;--bg2:#0d1822;--text:#e8f1fb;--muted:#9ab0c5;--line:rgba(110,188,255,.16)}
    html,body{margin:0;padding:0}
    body{min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left, rgba(111,224,255,.12), transparent 26%),radial-gradient(circle at top right, rgba(255,214,107,.09), transparent 24%),linear-gradient(180deg, var(--bg2), #04080d 72%)}
    .card{width:min(720px,100%);padding:28px;border-radius:28px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(111,224,255,.08), rgba(247,201,72,.05), rgba(255,255,255,.02));box-shadow:0 18px 54px rgba(0,0,0,.34)}
    a{display:inline-flex;align-items:center;justify-content:center;margin-top:16px;padding:12px 16px;border-radius:12px;border:1px solid rgba(111,224,255,.35);background:rgba(111,224,255,.14);color:var(--text);text-decoration:none;font-weight:600}
    p{color:var(--muted);line-height:1.55} h1{margin:0 0 10px;font-size:clamp(2rem,4vw,3rem)}
  </style>
</head>
<body>
  <main class="card">
    <h1>European Travel Companion</h1>
    <p>Opening the main trip dashboard. Travel prep now lives inside the companion as its own section.</p>
    <a href="europe-travel-companion.html">Open travel companion</a>
  </main>
</body>
</html>
